<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>연금 MBTI TEST · 카카오 채널</title>
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
</head>
<body>
  <main class="app-screen">
    <header class="app-header">
      <button class="app-header__btn" aria-label="뒤로">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M16 7H3.83L9.42 1.41 8 0 0 8l8 8 1.41-1.41L3.83 9H16V7Z"/></svg>
      </button>
      <span class="app-header__spacer"></span>
    </header>

    <div class="screen-body">
      <div class="content" style="gap:0;">
        <div class="title-block">
          <div class="icon-box">🍯</div>
          <div style="display:flex; flex-direction:column; gap:32px;">
            <h1 class="title-lg">친구니까 챙겨주는 투자 꿀팁</h1>
            <p class="subtitle--muted u-pre" style="font-size:var(--t-18); font-weight:500;">한국투자증권 카카오톡 채널에서는
꼭 챙겨야할 경제 소식을 전달드려요</p>
          </div>
        </div>
        <div style="margin-top:32px; border-radius:16px; overflow:hidden; box-shadow:0 0 10px rgba(0,0,0,.17);">
          <img src="../assets/img/kakao-card.png" alt="카카오톡 채널 카드" style="width:100%; display:block;">
        </div>
      </div>
    </div>

    <div class="btn-area">
      <button class="btn btn--primary btn--block">카카오톡 채널 추가하기</button>
    </div>
    <div class="home-indicator"></div>
  </main>
</body>
</html>
