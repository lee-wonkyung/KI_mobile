<!DOCTYPE html>
<html lang="ko">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
	<title>연금 MBTI TEST · 휴대폰번호</title>
	<link rel="stylesheet" href="../css/tokens.css">
	<link rel="stylesheet" href="../css/base.css">
	<link rel="stylesheet" href="../css/components.css">
</head>

<body>
	<main class="app-screen">
		<header class="app-header">
			<button class="app-header__btn" aria-label="뒤로">
				<svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
					<path d="M16 7H3.83L9.42 1.41 8 0 0 8l8 8 1.41-1.41L3.83 9H16V7Z" />
				</svg>
			</button>
			<span class="app-header__spacer"></span>
		</header>

		<div class="screen-body">
			<div class="content">
				<div class="icon-box">🔢</div>
				<div class="title-block">
					<h1 class="title-lg">휴대폰번호를 입력해 주세요</h1>
					<p class="subtitle">전문가의 해석을 받기 위해 필요해요</p>
				</div>
				<div class="field">
					<input class="input-field is-filled" type="tel" placeholder="010-1234-1234">
					<a class="field-link" href="#">안할래요</a>
				</div>
			</div>
		</div>

		<div class="btn-area">
			<div class="flex-box">
				<label class="checkbox">
					<input class="checkbox__input" type="checkbox">
					<span class="checkbox__box">
						<svg width="10" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
							<path d="M20 6L9 17l-5-5" />
						</svg>
					</span>
					개인정보 수집 및 활용 동의
				</label>
				<a href="#" class="btn-info">
					<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--c-gray-2)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
						<path d="M9 18l6-6-6-6"></path>
					</svg>
				</a>
			</div>
			<button class="btn btn--primary btn--block">제출하기</button>
		</div>

	</main>
</body>

</html>
