<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>연금 MBTI TEST · 휴대폰번호</title>
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
</head>
<body>
  <main class="app-screen">
    <header class="app-header">
      <button class="app-header__btn" aria-label="뒤로">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M16 7H3.83L9.42 1.41 8 0 0 8l8 8 1.41-1.41L3.83 9H16V7Z"/></svg>
      </button>
      <span class="app-header__spacer"></span>
    </header>

    <div class="screen-body">
      <div class="content" style="gap:32px;">
        <div class="icon-box">🔢</div>
        <div class="title-block" style="gap:32px;">
          <h1 class="title-lg">휴대폰번호를 입력해 주세요</h1>
          <p class="subtitle">전문가의 해석을 받기 위해 필요해요</p>
        </div>
        <div class="field" style="gap:8px;">
          <input class="input-field input-field--filled" type="tel" value="010-1234-1324">
          <a class="field-link" href="#">안할래요</a>
        </div>
      </div>
    </div>

    <div style="padding:0 32px 14px; display:flex; align-items:center; justify-content:space-between;">
      <span class="checkbox__main" style="font-size:var(--t-16); color:var(--c-gray-2);">
        <span class="checkbox__box checkbox--round" style="width:20px;height:20px;border-radius:999px;background:var(--c-gray-2);color:#fff;">
          <svg width="11" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
        </span>
        개인정보 수집 및 활용 동의
      </span>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--c-gray-2)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
    </div>
    <button class="btn btn--primary btn--block" style="width:auto; margin:0 20px 16px;">동의하고 인증번호 받기</button>

    <!-- 숫자 키보드 (CSS) -->
    <div class="keyboard">
      <div class="keyboard__row"><span class="keyboard__key keyboard__key--num">1</span><span class="keyboard__key keyboard__key--num">2</span><span class="keyboard__key keyboard__key--num">3</span></div>
      <div class="keyboard__row"><span class="keyboard__key keyboard__key--num">4</span><span class="keyboard__key keyboard__key--num">5</span><span class="keyboard__key keyboard__key--num">6</span></div>
      <div class="keyboard__row"><span class="keyboard__key keyboard__key--num">7</span><span class="keyboard__key keyboard__key--num">8</span><span class="keyboard__key keyboard__key--num">9</span></div>
      <div class="keyboard__row"><span class="keyboard__key keyboard__key--num" style="background:transparent;box-shadow:none;"></span><span class="keyboard__key keyboard__key--num">0</span><span class="keyboard__key keyboard__key--num" style="background:transparent;box-shadow:none;">⌫</span></div>
    </div>
    <div class="home-indicator"></div>
  </main>
</body>
</html>
