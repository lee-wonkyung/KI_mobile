<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>연금 MBTI TEST · 이름 입력</title>
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
</head>
<body>
  <main class="app-screen">
    <header class="app-header">
      <button class="app-header__btn" aria-label="뒤로">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M16 7H3.83L9.42 1.41 8 0 0 8l8 8 1.41-1.41L3.83 9H16V7Z"/></svg>
      </button>
      <span class="app-header__spacer"></span>
    </header>

    <div class="screen-body">
      <div class="content" style="gap:32px;">
        <div class="icon-box">😄</div>
        <h1 class="title-lg u-pre">결과를 안내를 위해
이름을 입력해 주세요</h1>
        <input class="input-field" type="text" placeholder="이름을 적어주세요">
      </div>
    </div>

    <button class="btn btn--primary btn--block" style="width:auto; margin:0 20px 20px;">다음</button>
    <!-- 키보드 (CSS) -->
    <div class="keyboard">
      <div class="keyboard__row"><span class="keyboard__key">ㅂ</span><span class="keyboard__key">ㅈ</span><span class="keyboard__key">ㄷ</span><span class="keyboard__key">ㄱ</span><span class="keyboard__key">ㅅ</span><span class="keyboard__key">ㅛ</span><span class="keyboard__key">ㅕ</span><span class="keyboard__key">ㅑ</span><span class="keyboard__key">ㅐ</span><span class="keyboard__key">ㅔ</span></div>
      <div class="keyboard__row"><span class="keyboard__key">ㅁ</span><span class="keyboard__key">ㄴ</span><span class="keyboard__key">ㅇ</span><span class="keyboard__key">ㄹ</span><span class="keyboard__key">ㅎ</span><span class="keyboard__key">ㅗ</span><span class="keyboard__key">ㅓ</span><span class="keyboard__key">ㅏ</span><span class="keyboard__key">ㅣ</span></div>
      <div class="keyboard__row"><span class="keyboard__key keyboard__key--fn">⇧</span><span class="keyboard__key">ㅋ</span><span class="keyboard__key">ㅌ</span><span class="keyboard__key">ㅊ</span><span class="keyboard__key">ㅍ</span><span class="keyboard__key">ㅠ</span><span class="keyboard__key">ㅜ</span><span class="keyboard__key">ㅡ</span><span class="keyboard__key keyboard__key--fn">⌫</span></div>
      <div class="keyboard__row"><span class="keyboard__key keyboard__key--fn">123</span><span class="keyboard__key keyboard__key--fn">🌐</span><span class="keyboard__key keyboard__key--space">space</span><span class="keyboard__key keyboard__key--fn">완료</span></div>
    </div>
    <div class="home-indicator"></div>
  </main>
</body>
</html>
