<!DOCTYPE html>
<html lang="ko">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
	<title>연금 MBTI TEST · 이름 입력</title>
	<link rel="stylesheet" href="../css/tokens.css">
	<link rel="stylesheet" href="../css/base.css">
	<link rel="stylesheet" href="../css/components.css">
</head>

<body>
	<main class="app-screen">
		<header class="app-header">
			<button class="app-header__btn" aria-label="뒤로">
				<svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
					<path d="M16 7H3.83L9.42 1.41 8 0 0 8l8 8 1.41-1.41L3.83 9H16V7Z" />
				</svg>
			</button>
			<span class="app-header__spacer"></span>
		</header>

		<div class="screen-body">
			<div class="content" style="gap:32px;">
				<div class="icon-box">😄</div>
				<h1 class="title-lg u-pre">결과를 안내를 위해
					이름을 입력해 주세요</h1>
				<input class="input-field" type="text" placeholder="이름을 적어주세요">
			</div>
		</div>

		<div class="btn-area">
			<button class="btn btn--primary btn--block">다음</button>
		</div>
	</main>
</body>

</html>
