<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>연금 MBTI TEST · 당첨</title>
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
</head>
<body>
  <main class="app-screen">
    <header class="app-header">
      <button class="app-header__btn" aria-label="뒤로">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M16 7H3.83L9.42 1.41 8 0 0 8l8 8 1.41-1.41L3.83 9H16V7Z"/></svg>
      </button>
      <span class="app-header__spacer"></span>
    </header>

    <div class="screen-body">
      <div class="content" style="gap:32px;">
        <h1 class="title-xl u-pre" style="color:var(--c-primary-alt);">당첨을
축하드려요~</h1>
        <img src="../assets/img/prize.png" alt="당첨 상품" style="width:100%; border-radius:2px; box-shadow:inset 0 0 0 1px var(--c-border-soft);">
        <div style="display:flex; flex-direction:column; gap:32px;">
          <p style="font-size:var(--t-24); font-weight:700; color:var(--c-ink-strong); margin:0;">“치카치카 치약세트”</p>
          <p class="subtitle--muted u-pre" style="font-size:var(--t-18); font-weight:500;">당첨정보를 입력하여
상품을 수령하세요~</p>
        </div>
      </div>
    </div>

    <div class="btn-area">
      <button class="btn btn--primary btn--block">당첨 정보 입력하기</button>
    </div>
    <div class="home-indicator"></div>
  </main>
</body>
</html>
