<!DOCTYPE html>
<html lang="ko">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
	<title>연금 MBTI TEST · 당첨</title>
	<link rel="stylesheet" href="../css/tokens.css">
	<link rel="stylesheet" href="../css/base.css">
	<link rel="stylesheet" href="../css/components.css">
</head>

<body>
	<main class="app-screen">
		<header class="app-header">
			<button class="app-header__btn" aria-label="뒤로">
				<svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
					<path d="M16 7H3.83L9.42 1.41 8 0 0 8l8 8 1.41-1.41L3.83 9H16V7Z" />
				</svg>
			</button>
			<span class="app-header__spacer"></span>
		</header>

		<div class="screen-body">
			<div class="content">
				<h1 class="title-xl u-pre">당첨을
					<span class="point-txt">축하드려요~</span>
				</h1>
				<img src="../assets/img/prize.png" alt="당첨 상품">
				<div class="u-flex-col-32">
					<p class="title-lg">“치카치카 치약세트”</p>
					<p class="subtitle--muted u-pre">당첨정보를 입력하여
						상품을 수령하세요~</p>
				</div>
			</div>
		</div>

		<div class="btn-area">
			<button class="btn btn--primary btn--block">당첨 정보 입력하기</button>
		</div>
	</main>
</body>

</html>
