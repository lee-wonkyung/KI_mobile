<!DOCTYPE html>
<html lang="ko">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
	<title>연금 MBTI TEST · 분석 중</title>
	<link rel="stylesheet" href="../css/tokens.css">
	<link rel="stylesheet" href="../css/base.css">
	<link rel="stylesheet" href="../css/components.css">
</head>

<body>
	<main class="app-screen">
		<header class="app-header">
			<button class="app-header__btn" aria-label="뒤로">
				<svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
					<path d="M16 7H3.83L9.42 1.41 8 0 0 8l8 8 1.41-1.41L3.83 9H16V7Z" />
				</svg>
			</button>
			<span class="app-header__spacer"></span>
		</header>

		<div class="screen-body screen-body--center">
			<img src="../assets/img/img-file.png" alt="분석 중" style="width:198px;">

			<div class="loading-progress">
				<div class="percent" id="percentText">38%</div>

				<div class="progress-bar">
					<div class="progress-fill" id="progressFill"></div>
				</div>
			</div>

			<h1 class="u-pre u-center-text title-loading"><span class="point-txt">김한투</span>님의
				연금 성향 분석 중...</h1>
		</div>
	</main>

	<script>
		(function () {
			var fill = document.getElementById('progressFill');
			var percent = document.getElementById('percentText');
			if (!fill || !percent) return;
			var duration = 3000; // 3초
			var start = null;

			// rAF로 매 프레임 width를 갱신하므로 CSS transition은 제거(끊김 방지)
			fill.style.transition = 'none';

			function step(timestamp) {
				if (start === null) start = timestamp;
				var progress = Math.min((timestamp - start) / duration, 1);
				var value = Math.round(progress * 100);
				fill.style.width = value + '%';
				percent.textContent = value + '%';
				if (progress < 1) {
					requestAnimationFrame(step);
				}
			}

			requestAnimationFrame(step);
		})();
	</script>
</body>

</html>
