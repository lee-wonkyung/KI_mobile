<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>연금 MBTI TEST · 가챠</title>
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
</head>
<body>
  <main class="app-screen">
    <!-- 가챠 배경 + 머신 (figma 자산) -->
    <img src="../assets/img/gacha-bg.png" alt="" style="position:absolute; inset:0; width:100%; height:100%; object-fit:cover;">
    <img src="../assets/img/gacha-machine.png" alt="" style="position:absolute; top:0; right:6px; width:190px;">

    <header class="app-header" style="position:relative; z-index:2;">
      <button class="app-header__btn" aria-label="뒤로">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M16 7H3.83L9.42 1.41 8 0 0 8l8 8 1.41-1.41L3.83 9H16V7Z"/></svg>

      <span class="app-header__spacer"></span>
    </header>

    <div class="screen-body" style="position:relative; z-index:2;">
      <div class="content">
        <h1 class="title-xl u-pre">행운의 가챠
한투니까 상품도
확실하게 당첨!</h1>
      </div>
    </div>

    <div class="btn-area" style="position:relative; z-index:2;">
      <button class="btn btn--primary-alt btn--block">가챠 참여하기</button>
    </div>
    <div class="home-indicator" style="position:relative; z-index:2;"></div>
  </main>

</html>
