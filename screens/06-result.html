<!DOCTYPE html>
<html lang="ko">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
	<title>연금 MBTI TEST · 결과</title>
	<link rel="stylesheet" href="../css/tokens.css">
	<link rel="stylesheet" href="../css/base.css">
	<link rel="stylesheet" href="../css/components.css">
</head>

<body>
	<main class="app-screen app-screen--result">
		<header class="app-header">
			<button class="app-header__btn" aria-label="뒤로">
				<svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
					<path d="M16 7H3.83L9.42 1.41 8 0 0 8l8 8 1.41-1.41L3.83 9H16V7Z" />
				</svg>
			</button>
			<button class="app-header__btn app-header__btn--save" aria-label="이미지 저장">
				이미지 저장
				<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
					<path d="M12 3v12m0 0l-4-4m4 4l4-4M4 17v2a2 2 0 002 2h12a2 2 0 002-2v-2" />
				</svg>
			</button>
		</header>

		<div class="screen-body">
			<div class="content">
				<!-- 결과 카드 -->
				<div class="result-stack">
					<div class="result-stack__ghost result-stack__ghost--l"></div>
					<div class="result-stack__ghost result-stack__ghost--r"></div>
					<article class="result-card" style="position:relative;">
						<img src="../assets/img/result_card01.png" alt="INFJ 캐릭터">
					</article>
				</div>

				<!-- 성향 리스트 -->
				<div class="list-card">
					<div class="list-row">
						<span class="list-row__check"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
								<path d="M20 6L9 17l-5-5" />
							</svg></span>
						<span class="list-row__text"><b>스스로 납득한 선택</b>인지가 중요해요</span>
					</div>
					<div class="list-row">
						<span class="list-row__check"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
								<path d="M20 6L9 17l-5-5" />
							</svg></span>
						<span class="list-row__text">한 번 확신하면 <b>꾸준한 타입</b>이에요</span>
					</div>
					<div class="list-row">
						<span class="list-row__check"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
								<path d="M20 6L9 17l-5-5" />
							</svg></span>
						<span class="list-row__text">단기적 변화에는 <b>쉽게 휘둘리지 않아요</b></span>
					</div>
				</div>

				<!-- 숨은 리스크 -->
				<div class="info-card">
					<p class="info-card__title">숨은 리스크</p>
					<p class="info-card__text u-pre">변화 신호를 늦게 받아들일 수 있어요.
						새로운 기회가 들어오는 시기를 잘 살펴야 해요</p>
				</div>
			</div>
		</div>

		<div class="btn-area">
			<button class="btn btn--primary btn--block">
				<img src="../assets/img/sparkle.png" alt="" style="width:20px;"> 전문가 해석 이어받기
			</button>
		</div>
		<div class="home-indicator"></div>
	</main>
</body>

</html>
