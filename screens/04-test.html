<!DOCTYPE html>
<html lang="ko">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
	<title>연금 MBTI TEST · 문항</title>
	<link rel="stylesheet" href="../css/tokens.css">
	<link rel="stylesheet" href="../css/base.css">
	<link rel="stylesheet" href="../css/components.css">
</head>

<body>
	<main class="app-screen app-screen--dark">
		<!-- 셀피 카메라 배경 (figma 자산) -->
		<img src="../assets/img/selfie-bg.png" alt="" class="test-bg">
		<div class="test-overlay"></div>
		<!-- 중앙 세로 가이드선 -->
		<div class="test-guideline"></div>

		<header class="app-header app-header--on-dark screen-body--layer">
			<button class="app-header__btn" aria-label="뒤로">
				<svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
					<path d="M16 7H3.83L9.42 1.41 8 0 0 8l8 8 1.41-1.41L3.83 9H16V7Z" />
				</svg>
			</button>
			<span class="app-header__spacer"></span>
		</header>

		<div class="screen-body screen-body--layer">
			<div class="content test-content">
				<div class="progress-bar progress-bar--seg">
					<span class="progress-bar__seg progress-bar__seg--on"></span>
					<span class="progress-bar__seg"></span>
					<span class="progress-bar__seg"></span>
					<span class="progress-bar__seg"></span>
				</div>

				<div class="test-question">
					<span class="test-question__no">Q1.</span>
					<div class="pill u-pre">나는 수익률보다
						안정성이 더 중요하다</div>
				</div>

				<div class="test-choices">
					<div class="test-choice">
						<span class="test-choice__mark">O</span>
						<span class="test-choice__label">맞다</span>
					</div>
					<div class="test-choice">
						<span class="test-choice__mark">X</span>
						<span class="test-choice__label">아니다</span>
					</div>
				</div>

				<div class="u-grow"></div>

				<div class="test-options">
					<span class="pill u-pre">꼬박꼬박
						들어오는 월급</span>
					<span class="pill u-pre">불안정하더라도
						큰 수익 기회</span>
				</div>
				<p class="test-hint">고개를 좌우로 움직여 선택해요</p>
			</div>
		</div>
	</main>
</body>

</html>
