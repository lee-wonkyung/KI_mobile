<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>연금 MBTI TEST · 문항</title>
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
</head>
<body>
  <main class="app-screen app-screen--dark">
    <!-- 셀피 카메라 배경 (figma 자산) -->
    <img src="../assets/img/selfie-bg.png" alt="" style="position:absolute; inset:0; width:100%; height:100%; object-fit:cover;">
    <div style="position:absolute; inset:0; background:linear-gradient(180deg, rgba(0,0,0,.46) 0%, rgba(102,102,102,0) 52%, rgba(0,0,0,.34) 100%);"></div>
    <!-- 중앙 세로 가이드선 -->
    <div style="position:absolute; left:50%; top:120px; bottom:0; border-left:1px solid rgba(255,255,255,.35);"></div>

    <header class="app-header app-header--on-dark" style="position:relative; z-index:2;">
      <button class="app-header__btn" aria-label="뒤로">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M16 7H3.83L9.42 1.41 8 0 0 8l8 8 1.41-1.41L3.83 9H16V7Z"/></svg>
      </button>
      <span class="app-header__spacer"></span>
    </header>

    <div class="screen-body" style="position:relative; z-index:2;">
      <div class="content" style="padding-top:8px; gap:48px; display:flex; flex-direction:column; align-items:center;">
        <div class="progress-bar" style="width:100%;">
          <span class="progress-bar__seg progress-bar__seg--on"></span>
          <span class="progress-bar__seg"></span>
          <span class="progress-bar__seg"></span>
          <span class="progress-bar__seg"></span>
        </div>

        <div style="display:flex; flex-direction:column; align-items:center; gap:10px;">
          <span style="font-size:var(--t-16); font-weight:700; color:#fff;">Q1.</span>
          <div class="q-badge q-badge--pill u-pre" style="text-align:center;">나는 수익률보다
안정성이 더 중요하다</div>
        </div>

        <div style="width:100%; display:flex; justify-content:space-around; align-items:center; margin-top:24px;">
          <div style="display:flex; flex-direction:column; align-items:center; gap:20px;">
            <span style="font-family:Georgia,'Times New Roman',serif; font-size:72px; font-weight:700; color:#fff; line-height:1;">O</span>
            <span style="font-size:var(--t-16); font-weight:700; color:#fff; opacity:.68;">맞다</span>
          </div>
          <div style="display:flex; flex-direction:column; align-items:center; gap:20px;">
            <span style="font-family:Georgia,'Times New Roman',serif; font-size:72px; font-weight:700; color:#fff; line-height:1;">X</span>
            <span style="font-size:var(--t-16); font-weight:700; color:#fff; opacity:.68;">아니다</span>
          </div>
        </div>

        <div class="u-grow"></div>

        <div style="width:100%; display:flex; gap:20px; justify-content:center;">
          <span class="pill u-pre" style="min-width:0; flex:1;">꼬박꼬박
들어오는 월급</span>
          <span class="pill u-pre" style="min-width:0; flex:1;">불안정하더라도
큰 수익 기회</span>
        </div>
        <p style="display:inline-flex; font-size:var(--t-13); font-weight:600; color:#fff; background:rgba(0,0,0,.4); padding:11px 30px; border-radius:30px; margin:0;">고개를 좌우로 움직여 선택해요</p>
      </div>
    </div>
    <div class="home-indicator home-indicator--light" style="position:relative; z-index:2;"></div>
  </main>
</body>
</html>
