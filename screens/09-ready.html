<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>연금 MBTI TEST · 해석 준비 완료</title>
  <link rel="stylesheet" href="../css/tokens.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
</head>
<body>
  <main class="app-screen">
    <header class="app-header">
      <button class="app-header__btn" aria-label="뒤로">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M16 7H3.83L9.42 1.41 8 0 0 8l8 8 1.41-1.41L3.83 9H16V7Z"/></svg>
      </button>
      <span class="app-header__spacer"></span>
    </header>

    <div class="screen-body" style="align-items:center; justify-content:center;">
      <div style="display:flex; flex-direction:column; align-items:center; gap:24px; padding:32px;">
        <img src="../assets/img/char-loading.png" alt="" style="width:150px;">
        <h1 style="font-size:var(--t-28); font-weight:700; color:var(--c-ink-strong); margin:0;">해석 준비 완료</h1>
        <p class="u-pre u-center-text subtitle--muted" style="font-size:var(--t-18); font-weight:500;">김한투 님의 성향을 기반으로
전문가가 안내를 드릴 예정이에요</p>
      </div>
    </div>

    <div class="btn-area" style="gap:10px;">
      <p class="btn-area__hint u-pre">이제 100% 당첨 선물까지
한 단계 남았어요.</p>
      <button class="btn btn--primary btn--block">꿀팁과 선물 챙겨가기</button>
    </div>
    <div class="home-indicator"></div>
  </main>
</body>
</html>
